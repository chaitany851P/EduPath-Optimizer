<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | EduPath Optimizer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/shared.css" rel="stylesheet">
    <style>
        .login-bg {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .brand-logo {
            font-size: 2rem;
            font-weight: 800;
            color: #2563eb;
            text-align: center;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body class="login-bg">
    <div id="toast-container" class="toast-container"></div>

    <div class="login-card">
        <div class="brand-logo">EduPath <span class="text-dark">Optimizer</span></div>
        <p class="text-center text-muted mb-4">Strategic AI Attendance Assistant</p>
        
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label text-secondary small fw-bold">USERNAME</label>
                <input type="text" id="username" class="form-control form-control-lg" placeholder="e.g. 2024001" required>
            </div>
            <div class="mb-4">
                <label class="form-label text-secondary small fw-bold">PASSWORD</label>
                <input type="password" id="password" class="form-control form-control-lg" placeholder="••••••••" required>
            </div>
            <button type="submit" id="loginBtn" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm">
                SECURE LOGIN
            </button>
        </form>
        
        <div class="mt-4 text-center">
            <p class="text-muted small mb-1">Professional Test Credentials:</p>
            <p class="text-primary small mb-0">admin / admin123</p>
            <p class="text-primary small mb-0">teacher01 / teacher123</p>
            <p class="text-primary small">2024001 / student123</p>
        </div>
    </div>

    <script>
        function showToast(msg, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast-msg toast-${type}`;
            toast.innerText = msg;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const originalText = btn.innerText;
            
            btn.disabled = true;
            btn.innerText = 'VERIFYING...';

            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const formData = new FormData();
                formData.append('username', username);
                formData.append('password', password);

                const res = await fetch('/api/auth/token', {
                    method: 'POST',
                    body: formData
                });

                const data = await res.json();

                if (res.ok) {
                    showToast(`Welcome back, ${data.name}!`);
                    localStorage.setItem('access_token', data.access_token);
                    localStorage.setItem('user_role', data.role);
                    localStorage.setItem('user_name', data.name);
                    localStorage.setItem('student_id', data.user_id);

                    // Professional Redirect Flow
                    setTimeout(() => {
                        if (data.role === 'admin') window.location.href = '/admin.html';
                        else if (data.role === 'teacher') window.location.href = '/teacher.html';
                        else window.location.href = '/student.html';
                    }, 1000);
                } else {
                    showToast(data.detail || 'Login Failed', 'error');
                }
            } catch (err) {
                showToast('Server connection error', 'error');
            } finally {
                btn.disabled = false;
                btn.innerText = originalText;
            }
        });
    </script>
</body>
</html>
