<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Portal | EduPath Optimizer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    <link href="/static/shared.css" rel="stylesheet">
    <style>
        .view-section { display: none; }
        .view-section.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div id="toast-container" class="toast-container"></div>

    <div class="app-container">
        <div class="sidebar">
            <div class="p-4 border-bottom border-secondary mb-3 text-center">
                <h5 class="m-0 fw-bold">EduPath <span class="text-primary">Tchr</span></h5>
            </div>
            <nav id="sidebarNav">
                <a href="#students" class="nav-link active"><i class="fas fa-users me-3"></i> My Students</a>
                <a href="#marks" class="nav-link"><i class="fas fa-file-invoice me-3"></i> Marks Entry</a>
                <a href="#" class="nav-link text-danger" id="logoutBtn"><i class="fas fa-sign-out-alt me-3"></i> Logout</a>
            </nav>
        </div>

        <main class="main-content">
            <header class="d-flex justify-content-between align-items-center mb-5">
                <div>
                    <h2 class="fw-bold m-0">Faculty Dashboard</h2>
                    <p class="text-muted">Academic Management System</p>
                </div>
                <div class="d-flex align-items-center">
                    <div class="text-end me-3">
                        <span class="d-block fw-bold" id="teacherName">Faculty User</span>
                        <span class="badge bg-success shadow-sm">Verified Faculty</span>
                    </div>
                </div>
            </header>

            <!-- SPA Views -->
            <div id="students" class="view-section active">
                <div class="glass-card">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h5 class="fw-bold m-0">Assigned Students</h5>
                        <div class="input-group w-25 shadow-sm">
                            <input type="text" class="form-control form-control-sm" placeholder="Search ID...">
                            <button class="btn btn-sm btn-primary"><i class="fas fa-search"></i></button>
                        </div>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr><th>ID</th><th>Name</th><th>Track</th><th>Attendance</th><th class="text-end">Action</th></tr>
                            </thead>
                            <tbody id="studentTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div id="marks" class="view-section">
                <div class="glass-card text-center p-5">
                    <i class="fas fa-file-invoice fs-1 text-muted mb-3"></i>
                    <h4>Marks Entry Module</h4>
                    <p class="text-muted">Select a subject to begin CIE/Mid-term entry.</p>
                    <button class="btn btn-primary shadow-sm">Open Marks Ledger</button>
                </div>
            </div>
        </main>
    </div>

    <!-- Attendance Modal -->
    <div class="modal fade" id="attendanceModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title fw-bold">Update Attendance</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="mb-3">
                        <label class="form-label fw-bold small">STUDENT NAME</label>
                        <input type="text" id="editName" class="form-control" disabled>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold small">TOTAL ATTENDED CLASSES</label>
                        <input type="number" id="editCount" class="form-control form-control-lg border-primary">
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary px-4 fw-bold shadow-sm" id="saveBtn">UPDATE RECORD</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const TOKEN = localStorage.getItem('access_token');
        if (!TOKEN || localStorage.getItem('user_role') !== 'teacher') window.location.href = '/login';

        document.getElementById('teacherName').innerText = localStorage.getItem('user_name');

        function showToast(msg, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast-msg toast-${type}`;
            toast.innerText = msg;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        // SPA Navigation logic
        window.addEventListener('hashchange', handleNav);
        function handleNav() {
            const hash = window.location.hash.substring(1) || 'students';
            document.querySelectorAll('.nav-link').forEach(link => {
                link.classList.remove('active');
                if (link.getAttribute('href') === `#${hash}`) link.classList.add('active');
            });
            document.querySelectorAll('.view-section').forEach(view => {
                view.classList.remove('active');
                if (view.id === hash) view.classList.add('active');
            });
        }

        async function loadStudents() {
            const res = await fetch('/api/teachers/students', {
                headers: { 'Authorization': `Bearer ${TOKEN}` }
            });
            const data = await res.json();
            const tbody = document.getElementById('studentTableBody');
            tbody.innerHTML = data.students.map(s => `
                <tr>
                    <td class="fw-bold">${s.username}</td><td>${s.name}</td>
                    <td><span class="badge bg-light text-dark border">${s.career_track}</span></td>
                    <td><div class="progress" style="height: 6px; width: 100px;"><div class="progress-bar bg-success" style="width: ${Math.min(100, (s.attended/20)*100)}%"></div></div><span class="small text-muted">${s.attended} Attended</span></td>
                    <td class="text-end"><button class="btn btn-sm btn-outline-primary" onclick="openModal('${s.username}', '${s.name}', ${s.attended})"><i class="fas fa-edit"></i></button></td>
                </tr>`).join('');
        }

        let currentId = '';
        const modal = new bootstrap.Modal(document.getElementById('attendanceModal'));
        window.openModal = (id, name, count) => { currentId = id; document.getElementById('editName').value = name; document.getElementById('editCount').value = count; modal.show(); };

        document.getElementById('saveBtn').addEventListener('click', async () => {
            const res = await fetch('/api/teachers/update-attendance', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ student_id: currentId, attended_count: parseInt(document.getElementById('editCount').value) })
            });
            if (res.ok) { showToast('Record Updated'); modal.hide(); loadStudents(); }
            else showToast('Failed to update', 'error');
        });

        document.getElementById('logoutBtn').addEventListener('click', () => { localStorage.clear(); window.location.href = '/login'; });

        handleNav();
        loadStudents();
    </script>
</body>
</html>
