version: '3.8'

services:
  # ═════════════════════════════════════════════════════════════
  # EduPath Optimizer WebAPI
  # ═════════════════════════════════════════════════════════════
  api:
    image: edupath-optimizer:latest
    container_name: edupath_api
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${PORT:-8000}:8000"
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - MONGODB_URI=${MONGODB_URI}
      - MONGODB_DATABASE=${MONGODB_DATABASE:-edupath_optimizer}
      - SECRET_KEY=${SECRET_KEY}
      - ALGORITHM=${ALGORITHM:-HS256}
      - UNIVERSITY_NAME=${UNIVERSITY_NAME}
      - ENABLE_MULTI_CAMPUS=${ENABLE_MULTI_CAMPUS:-true}
      - DEBUG=${DEBUG:-false}
    depends_on:
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - edupath-network
    volumes:
      - ./logs:/app/logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ═════════════════════════════════════════════════════════════
  # MongoDB Database (Optional - use MongoDB Atlas in production)
  # ═════════════════════════════════════════════════════════════
  mongodb:
    image: mongo:7.0
    container_name: edupath_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: ${MONGODB_DATABASE:-edupath_optimizer}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    restart: unless-stopped
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - edupath-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ═════════════════════════════════════════════════════════════
  # Nginx Reverse Proxy (Optional but recommended)
  # ═════════════════════════════════════════════════════════════
  nginx:
    image: nginx:alpine
    container_name: edupath_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro  # SSL certificates
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - edupath-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ═════════════════════════════════════════════════════════════
  # Prometheus Monitoring (Optional)
  # ═════════════════════════════════════════════════════════════
  prometheus:
    image: prom/prometheus:latest
    container_name: edupath_prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    restart: unless-stopped
    networks:
      - edupath-network
    depends_on:
      - api

  # ═════════════════════════════════════════════════════════════
  # Grafana Dashboards (Optional)
  # ═════════════════════════════════════════════════════════════
  grafana:
    image: grafana/grafana:latest
    container_name: edupath_grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    networks:
      - edupath-network
    depends_on:
      - prometheus

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  edupath-network:
    driver: bridge

# ═════════════════════════════════════════════════════════════
# USAGE:
# ═════════════════════════════════════════════════════════════
# 
# Production Start:
#   1. Create .env file with production values
#   2. docker-compose -f docker-compose.prod.yml up -d
#   3. docker-compose exec api python backend/init_db.py
#
# Development Start:
#   docker-compose up -d
#
# View Logs:
#   docker-compose logs -f api
#
# Database Access:
#   mongosh mongodb://admin:password@localhost:27017
#
# API Documentation:
#   http://localhost:8000/docs
#
# Monitoring:
#   Prometheus: http://localhost:9090
#   Grafana: http://localhost:3000
#
# Stop Services:
#   docker-compose down
#
# Clean Everything:
#   docker-compose down -v
